<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>API Docs — Đức Giang Tester Education</title>
<link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css" />
<style>
  :root { --bg:#07090f; --bg1:#0c0f1c; --c1:#38bdf8; --c2:#818cf8; --text:#f1f5f9; }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); font-family: Inter, system-ui, sans-serif; }

  .topbar {
    background: rgba(7,9,15,0.92); backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    padding: 14px 24px; display:flex; align-items:center; gap:12px;
    position: sticky; top:0; z-index:999;
  }
  .topbar .logo {
    width:34px; height:34px; border-radius:9px;
    background: linear-gradient(135deg, var(--c1), var(--c2));
    display:flex; align-items:center; justify-content:center;
    font-weight:800; font-size:11px; color:#07090f; flex-shrink:0;
  }
  .topbar .title { color:var(--text); font-weight:700; font-size:14.5px; }
  .topbar .title small { display:block; font-size:10.5px; font-weight:500; color:#94a3b8; }
  .topbar a {
    margin-left:auto; font-size:13px; color:#94a3b8; text-decoration:none;
    padding:7px 14px; border:1px solid rgba(255,255,255,0.12); border-radius:8px;
    transition: all .15s;
  }
  .topbar a:hover { color:var(--c1); border-color:var(--c1); }

  #swagger-ui { background: var(--bg1); min-height: 100vh; }

  /* Dark theme override for Swagger UI */
  .swagger-ui { filter: invert(1) hue-rotate(180deg); }
  .swagger-ui .microlight, .swagger-ui img, .swagger-ui .topbar { filter: invert(1) hue-rotate(180deg); }
</style>
</head>
<body>

  <div class="logo">ĐG</div>
  <div class="title">Practice API Docs<small>Đức Giang Tester Education</small></div>
  <a href="https://ducgiangtester.com">← Về trang chủ</a>
</div>
