<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Products — ShopDemo</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<script src="../js/app.js"></script>
<script>requireLogin(); document.write(renderNav('products'));</script>

<div class="page-wrap">
  <div class="page-title">All Products</div>
  <div class="page-sub">Find the perfect tech for you</div>

  <!-- FILTERS -->
  <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:24px;align-items:center">
    <input type="search" id="search-input" data-testid="search-input" placeholder="🔍 Search products..." style="max-width:280px" oninput="renderProducts()">
    <select id="filter-category" data-testid="filter-category" style="max-width:180px" onchange="renderProducts()">
      <option value="">All categories</option>
      <option value="Laptop">Laptop</option>
      <option value="Phone">Phone</option>
      <option value="Tablet">Tablet</option>
      <option value="Audio">Audio</option>
      <option value="Accessories">Accessories</option>
      <option value="Monitor">Monitor</option>
      <option value="Storage">Storage</option>
    </select>
    <select id="sort-by" data-testid="sort-by" style="max-width:180px" onchange="renderProducts()">
      <option value="">Sort by</option>
      <option value="price-asc">Price: Low → High</option>
      <option value="price-desc">Price: High → Low</option>
      <option value="rating">Best Rating</option>
      <option value="name">Name A-Z</option>
    </select>
    <span id="result-count" data-testid="result-count" style="font-size:13px;color:var(--text2);margin-left:auto"></span>
  </div>

  <div id="product-grid" data-testid="product-grid" class="product-grid"></div>
  <div id="no-result" data-testid="no-result" class="empty-state" style="display:none">
    <div class="icon">🔍</div>
    <p>No products found. Try a different search.</p>
  </div>
</div>

<script>
function renderProducts() {
  let q = document.getElementById('search-input').value.toLowerCase();
  let cat = document.getElementById('filter-category').value;
  let sort = document.getElementById('sort-by').value;

  let data = PRODUCTS.filter(p =>
    (!q || p.name.toLowerCase().includes(q) || p.category.toLowerCase().includes(q)) &&
    (!cat || p.category === cat)
  );

  if (sort === 'price-asc') data.sort((a,b) => a.price - b.price);
  else if (sort === 'price-desc') data.sort((a,b) => b.price - a.price);
  else if (sort === 'rating') data.sort((a,b) => b.rating - a.rating);
  else if (sort === 'name') data.sort((a,b) => a.name.localeCompare(b.name));

  document.getElementById('result-count').textContent = `${data.length} product(s)`;
  const grid = document.getElementById('product-grid');
  const noResult = document.getElementById('no-result');

  if (!data.length) { grid.innerHTML = ''; noResult.style.display = 'block'; return; }
  noResult.style.display = 'none';

  grid.innerHTML = data.map(p => `
    <div class="product-card" data-testid="product-card-${p.id}">
      <div class="product-img" data-testid="product-img-${p.id}">${p.emoji}</div>
      <div class="product-info">
        <div class="product-category">${p.category}</div>
        <div class="product-name" data-testid="product-name-${p.id}">${p.name}</div>
        <div class="product-rating">★ ${p.rating} <span style="color:var(--text3)">(${p.reviews})</span></div>
        <div>
          <span class="product-price" data-testid="product-price-${p.id}">${formatPrice(p.price)}</span>
          ${p.oldPrice ? `<span class="product-old-price">${formatPrice(p.oldPrice)}</span>` : ''}
        </div>
        <div class="product-stock ${p.stock > 0 ? 'in-stock' : 'out-stock'}" data-testid="product-stock-${p.id}">
          ${p.stock > 0 ? `✓ In stock (${p.stock})` : '✗ Out of stock'}
        </div>
        <div class="mt-auto" style="display:flex;gap:8px;margin-top:12px">
          <a href="product-detail.html?id=${p.id}" class="btn btn-secondary btn-sm" data-testid="btn-detail-${p.id}" style="flex:1;justify-content:center">Detail</a>
          <button class="btn btn-primary btn-sm" data-testid="btn-add-cart-${p.id}"
            onclick="quickAdd(${p.id})" ${p.stock === 0 ? 'disabled' : ''} style="flex:1;justify-content:center">
            Add to Cart
          </button>
        </div>
      </div>
    </div>
  `).join('');
}

function quickAdd(id) {
  const p = PRODUCTS.find(x => x.id === id);
  addToCart(p, 1);
  // flash feedback
  const btn = document.querySelector(`[data-testid="btn-add-cart-${id}"]`);
  const orig = btn.textContent;
  btn.textContent = '✓ Added!';
  btn.style.background = '#16a34a';
  setTimeout(() => { btn.textContent = orig; btn.style.background = ''; }, 1200);
}

renderProducts();
updateCartBadge();
</script>
</body>
</html>
