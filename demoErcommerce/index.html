<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Login — ShopDemo</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <h1>🛍️ ShopDemo</h1>
      <p>E-Commerce Practice Site for Playwright</p>
    </div>
    <div class="alert alert-error" id="login-error" data-testid="login-error" style="display:none"></div>
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="username" data-testid="input-username" placeholder="Enter username" autocomplete="off">
      <div class="err" id="err-user" data-testid="err-username">Username is required</div>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" data-testid="input-password" placeholder="Enter password">
      <div class="err" id="err-pass" data-testid="err-password">Password is required</div>
    </div>
    <button class="btn btn-primary btn-full" id="btn-login" data-testid="btn-login" onclick="doLogin()" style="margin-top:4px">Login</button>
    <div class="login-hint">admin / 123456 &nbsp;|&nbsp; tester / abc123</div>
  </div>
</div>
<script src="js/app.js"></script>
<script>
  if (isLoggedIn()) window.location.href = 'pages/products.html';
  function doLogin() {
    const u = document.getElementById('username').value.trim();
    const p = document.getElementById('password').value.trim();
    let ok = true;
    ['err-user','err-pass'].forEach(id => document.getElementById(id).classList.remove('show'));
    ['username','password'].forEach(id => document.getElementById(id).classList.remove('error'));
    document.getElementById('login-error').style.display = 'none';
    if (!u) { document.getElementById('err-user').classList.add('show'); document.getElementById('username').classList.add('error'); ok = false; }
    if (!p) { document.getElementById('err-pass').classList.add('show'); document.getElementById('password').classList.add('error'); ok = false; }
    if (!ok) return;
    const user = USERS.find(x => x.username === u && x.password === p);
    if (!user) {
      const el = document.getElementById('login-error');
      el.textContent = 'Invalid username or password. Please try again.';
      el.style.display = 'block';
      return;
    }
    sessionStorage.setItem('shop_user', JSON.stringify(user));
    window.location.href = 'pages/products.html';
  }
  document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
