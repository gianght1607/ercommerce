<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Order Success — ShopDemo</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<script src="../js/app.js"></script>
<script>requireLogin(); document.write(renderNav(''));</script>

<div class="page-wrap" style="max-width:680px">
  <div class="card" style="text-align:center;padding:40px">
    <div style="font-size:64px;margin-bottom:16px">🎉</div>
    <h1 style="font-size:26px;font-weight:700;color:var(--green);margin-bottom:8px" data-testid="success-title">Order Placed Successfully!</h1>
    <p style="color:var(--text2);margin-bottom:24px" data-testid="success-msg">Thank you for your order. We'll process it right away.</p>

    <div style="background:var(--bg3);border-radius:10px;padding:20px;margin-bottom:24px">
      <div style="font-size:13px;color:var(--text2);margin-bottom:4px">Order ID</div>
      <div style="font-size:24px;font-weight:700;color:var(--accent2)" id="order-id-display" data-testid="order-id"></div>
    </div>

    <div id="order-summary" data-testid="order-summary" style="text-align:left;margin-bottom:28px"></div>

    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
      <a href="orders.html" class="btn btn-primary" data-testid="btn-view-orders">📋 View My Orders</a>
      <a href="products.html" class="btn btn-secondary" data-testid="btn-continue-shopping">🛍️ Continue Shopping</a>
    </div>
  </div>
</div>

<script>
updateCartBadge();
const orderId = sessionStorage.getItem('last_order_id');
const order = getOrders().find(o => o.id === orderId);

if (orderId) document.getElementById('order-id-display').textContent = orderId;

if (order) {
  const payLabels = { cod: 'Cash on Delivery', bank: 'Bank Transfer', card: 'Credit/Debit Card' };
  const shipLabels = { standard: 'Standard (3-5 days)', express: 'Express (1-2 days)', 'same-day': 'Same Day' };
  document.getElementById('order-summary').innerHTML = `
    <div class="card" style="padding:16px">
      <div class="section-title">Order Details</div>
      ${order.items.map(i => `
        <div style="display:flex;justify-content:space-between;font-size:14px;padding:8px 0;border-bottom:1px solid var(--border)">
          <span>${i.emoji} ${i.name} ×${i.qty}</span>
          <span style="color:var(--accent2)">${formatPrice(i.price*i.qty)}</span>
        </div>
      `).join('')}
      <div class="summary-row" style="margin-top:12px"><span>Subtotal</span><span>${formatPrice(order.subtotal)}</span></div>
      <div class="summary-row"><span>Shipping (${shipLabels[order.shipping.method]})</span><span>${order.shipping.cost ? formatPrice(order.shipping.cost) : 'Free'}</span></div>
      ${order.discount ? `<div class="summary-row" style="color:var(--green)"><span>Discount (5%)</span><span>-${formatPrice(order.discount)}</span></div>` : ''}
      <div class="summary-row total"><span>Total Paid</span><span>${formatPrice(order.total)}</span></div>
      <hr class="divider">
      <div style="font-size:13px;color:var(--text2);display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <div><strong style="color:var(--text)">Ship to:</strong><br>${order.customer.name}<br>${order.customer.address}</div>
        <div><strong style="color:var(--text)">Payment:</strong><br>${payLabels[order.payment]}<br><span class="badge badge-yellow">${order.status}</span></div>
      </div>
    </div>
  `;
}
</script>
</body>
</html>
