<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>IFrame Content</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #1a1d27; color: #e2e8f0; font-family: 'Segoe UI', sans-serif; padding: 24px; }
    h3 { color: #a78bfa; margin-bottom: 16px; font-size: 16px; }
    .form-group { margin-bottom: 14px; }
    label { display: block; font-size: 13px; color: #94a3b8; margin-bottom: 5px; }
    input { width: 100%; background: #22263a; border: 1px solid #2e3250; color: #e2e8f0; padding: 9px 13px; border-radius: 7px; font-size: 14px; outline: none; }
    input:focus { border-color: #7c6af7; }
    button { background: #7c6af7; color: #fff; border: none; padding: 9px 20px; border-radius: 7px; font-size: 14px; cursor: pointer; font-weight: 600; }
    button:hover { background: #a78bfa; }
    .result { margin-top: 14px; background: #22263a; border: 1px solid #2e3250; border-radius: 7px; padding: 12px; font-size: 13px; color: #94a3b8; }
    p.note { font-size: 12px; color: #64748b; margin-top: 6px; }
  </style>
</head>
<body>
  <h3>🖼️ Inside the IFrame</h3>
  <p class="note" style="margin-bottom:16px">This content is inside an iframe. Use frameLocator() in Playwright to access it.</p>

  <div class="form-group">
    <label for="if-name">Name (inside iframe)</label>
    <input type="text" id="if-name" data-testid="if-name" placeholder="Type something here...">
  </div>
  <div class="form-group">
    <label for="if-email">Email (inside iframe)</label>
    <input type="email" id="if-email" data-testid="if-email" placeholder="email@example.com">
  </div>
  <button id="if-submit" data-testid="if-submit" onclick="submit()">Submit (inside iframe)</button>
  <div class="result" id="if-result" data-testid="if-result">Fill the form above and click Submit</div>

  <script>
  function submit() {
    const name = document.getElementById('if-name').value;
    const email = document.getElementById('if-email').value;
    document.getElementById('if-result').innerHTML =
      `<strong style="color:#22c55e">Submitted from iframe!</strong><br>Name: ${name || '(empty)'} | Email: ${email || '(empty)'}`;
  }
  </script>
</body>
</html>
