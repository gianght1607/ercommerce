<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>New Window</title>
<style>* {box-sizing:border-box;margin:0;padding:0} body{background:#0f1117;color:#e2e8f0;font-family:'Segoe UI',sans-serif;padding:40px;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh} h2{color:#a78bfa;margin-bottom:16px} p{color:#94a3b8;font-size:14px;margin-bottom:8px} .msg{background:#1a1d27;border:1px solid #7c6af7;border-radius:10px;padding:20px 28px;font-size:18px;color:#e2e8f0;margin:20px 0} button{background:#7c6af7;color:#fff;border:none;padding:10px 24px;border-radius:8px;font-size:14px;cursor:pointer;margin-top:8px} button:hover{background:#a78bfa}</style>
</head>
<body>
  <h2>🪟 New Window</h2>
  <p>This window was opened from the Multiple Tabs page.</p>
  <p>Message received:</p>
  <div class="msg" id="msg-display" data-testid="msg-display">No message</div>
  <p style="font-size:12px">data-testid="msg-display"</p>
  <button onclick="window.close()" data-testid="btn-close-window">Close Window</button>
  <script>
    const params = new URLSearchParams(window.location.search);
    const msg = params.get('msg');
    if (msg) document.getElementById('msg-display').textContent = msg;
  </script>
</body>
</html>
